version: 2

project_name: gomsi

before:
  hooks:
    - go mod tidy

builds:
  - id: gomsi
    main: ./cmd/gomsi
    binary: gomsi
    goos:
      - linux
    goarch:
      - amd64
    goamd64:
      - v1
    flags:
      - -trimpath
    ldflags:
      - -s -w

nfpms:
  - id: gomsi
    package_name: gomsi
    ids:
      - gomsi
    formats:
      - deb
      - rpm
    vendor: "Gomsi contributors"
    homepage: https://github.com/krivospitsky/gomsi
    maintainer: "Alexandr Krivospitsky <alex@krivospitsky.ru>"
    description: |-
      Linux-first MSI package generator for Go applications.
      Builds Windows MSI installers for Go binaries on Linux without the Windows SDK.
    license: MIT
    dependencies:
      - msitools
      - gcab
    bindir: /usr/bin
    file_name_template: "{{ .ConventionalFileName }}"

dockers_v2:
  - id: gomsi
    dockerfile: Dockerfile
    ids:
      - gomsi
    images:
      - "krivospitsky/gomsi"
    tags:
      - "{{ .Tag }}"
      - "v{{ .Major }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - latest
    platforms:
      - linux/amd64
    sbom: false
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"

archives:
  - id: gomsi
    ids:
      - gomsi
    name_template: "gomsi_{{ .Version }}_linux_amd64"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
